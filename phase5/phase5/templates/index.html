<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL/TLS Hacking Suite - Phase 5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Body Styling */
        body {
            font-family: 'Inter', sans-serif; /* Using Inter font as per instructions */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top */
            padding: 20px;
        }
        
        /* Container for content */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Header Styling */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2); /* Slightly transparent background */
            border-radius: 15px; /* Rounded corners */
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        /* Card Styling */
        .card {
            background: rgba(255, 255, 255, 0.95); /* Semi-transparent white */
            border-radius: 15px; /* Rounded corners */
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .card h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.8em;
            border-bottom: 2px solid #e1e8ed;
            padding-bottom: 10px;
        }
        
        /* Form Group Styling */
        .scan-form {
            display: grid;
            gap: 25px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 700;
            margin-bottom: 10px;
            color: #2c3e50;
            font-size: 1.1em;
        }
        
        .form-group input[type="text"], 
        .form-group input[type="number"], 
        .form-group select, 
        .form-group textarea {
            padding: 14px;
            border: 2px solid #e1e8ed;
            border-radius: 10px; /* More rounded */
            font-size: 17px;
            transition: all 0.3s ease;
            background-color: #fcfdff;
        }
        
        .form-group input[type="text"]:focus, 
        .form-group input[type="number"]:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
            background-color: #ffffff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            font-size: 1em;
            color: #333;
        }
        
        /* Tools Grid */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Larger min-width */
            gap: 20px; /* Increased gap */
            margin-top: 15px;
        }
        
        .tool-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px; /* More rounded */
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px; /* Ensure consistent height */
        }
        
        .tool-card:hover {
            border-color: #667eea;
            transform: translateY(-3px); /* More pronounced lift */
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .tool-card.selected {
            border-color: #667eea;
            background: #e6eaff; /* Lighter selected background */
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .tool-card h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.15em;
        }
        
        .tool-card p {
            font-size: 14.5px;
            color: #6c757d;
            line-height: 1.5;
        }

        .tool-options {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e1e8ed;
        }

        .tool-options .form-group {
            margin-bottom: 10px;
        }
        
        /* Button Styling */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 35px; /* Larger padding */
            border-radius: 10px; /* More rounded */
            font-size: 18px; /* Larger font */
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #007bff, #0056b3);
        }
        .btn-primary:hover {
            background: linear-gradient(45deg, #0056b3, #007bff);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #6c757d, #495057);
        }
        .btn-secondary:hover {
            background: linear-gradient(45deg, #495057, #6c757d);
        }

        .btn-info {
            background: linear-gradient(45deg, #17a2b8, #117a8b);
        }
        .btn-info:hover {
            background: linear-gradient(45deg, #117a8b, #17a2b8);
        }

        /* Results and Reports */
        .results h2, .reports-section h2 {
            margin-bottom: 25px;
        }

        .result-item, .report-item {
            background: #ffffff;
            border-left: 6px solid;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .result-item.success { border-color: #28a745; }
        .result-item.warning { border-color: #ffc107; }
        .result-item.error { border-color: #dc3545; } /* For errors during execution */
        .result-item.critical { border-color: #dc3545; } /* For detected vulnerabilities */

        .result-item h4, .report-item h4 {
            margin-bottom: 10px;
            color: #2c3e50;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-item pre {
            background: #f8f9fa;
            border-radius: 8px; /* More rounded */
            padding: 18px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            max-height: 350px; /* Slightly taller */
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word; /* Ensure long lines break */
            border: 1px solid #e9ecef;
            margin-top: 15px;
        }
        
        /* Report specific styling */
        .report-item {
            border-color: #667eea; /* A neutral color for reports */
        }

        .report-item .report-summary p {
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .report-item .report-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Loading Spinner */
        .loading { 
            text-align: center; 
            padding: 50px; 
            color: #6c757d; 
            font-size: 1.1em; 
        }
        .spinner {
            width: 50px; /* Larger spinner */
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Status Indicators */
        .status-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-success { background-color: #28a745; }
        .status-warning { background-color: #ffc107; }
        .status-error { background-color: #dc3545; }
        .status-info { background-color: #17a2b8; } /* For unknown status */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SSL/TLS Hacking Suite</h1>
            <p>Phase 5: Integration, Reporting & Tool Deployment</p>
        </div>
        
        <div class="card scan-tool">
            <h2>⚙️ Launch Security Scan</h2>
            <div class="scan-form">
                <div class="form-group">
                    <label for="targetUrl">Target Hostname or IP</label>
                    <input type="text" id="targetUrl" placeholder="e.g., example.com, 192.168.1.1" required>
                </div>

                <div id="toolParameters">
                    </div>

                <div class="form-group">
                    <label>Select Testing Tools</label>
                    <div class="tools-grid" id="toolsGrid">
                        </div>
                </div>
                <button class="btn" onclick="startScan()" id="scanBtn">
                    🚀 Launch Security Scan
                </button>
            </div>
        </div>

        <div class="card results" id="resultsSection" style="display: none;">
            <h2>📊 Live Scan Results</h2>
            <div id="resultsContainer">
                </div>
        </div>

        <div class="card reports-section">
            <h2>📋 Generated Reports</h2>
            <div id="reportsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading reports...
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedTools = new Set();
        let scanResults = {}; // To store real-time scan results
        const toolOptions = {}; // Stores options for each selected tool

        // Function to load available tools from the backend API
        async function loadTools() {
            try {
                const response = await fetch('/api/tools');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const tools = await response.json();
                const toolsGrid = document.getElementById('toolsGrid');
                toolsGrid.innerHTML = ''; // Clear existing content

                tools.forEach(tool => {
                    const toolCard = document.createElement('div');
                    toolCard.className = 'tool-card';
                    toolCard.setAttribute('data-tool-id', tool.id);
                    toolCard.innerHTML = `
                        <h4>${tool.name}</h4>
                        <p>${tool.description}</p>
                    `;
                    toolCard.addEventListener('click', () => toggleToolSelection(tool.id, tool.parameters));
                    toolsGrid.appendChild(toolCard);
                });

            } catch (error) {
                console.error('Failed to load tools:', error);
                document.getElementById('toolsGrid').innerHTML = '<p style="color: red;">Error loading tools. Please refresh the page.</p>';
            }
        }

        // Function to toggle tool selection
        function toggleToolSelection(toolId, parameters) {
            const toolCard = document.querySelector(`.tool-card[data-tool-id="${toolId}"]`);
            const toolParametersContainer = document.getElementById('toolParameters');

            if (selectedTools.has(toolId)) {
                selectedTools.delete(toolId);
                toolCard.classList.remove('selected');
                // Remove tool-specific parameter inputs
                const existingParams = toolParametersContainer.querySelectorAll(`[data-tool-param-for="${toolId}"]`);
                existingParams.forEach(el => el.remove());
                delete toolOptions[toolId]; // Clear options for deselected tool
            } else {
                selectedTools.add(toolId);
                toolCard.classList.add('selected');
                // Add tool-specific parameter inputs
                if (parameters && parameters.length > 1) { // Only add if there are custom params beyond 'target'
                    const paramGroup = document.createElement('div');
                    paramGroup.className = 'form-group tool-options';
                    paramGroup.setAttribute('data-tool-param-for', toolId);
                    paramGroup.innerHTML = `<h4>Options for ${toolCard.querySelector('h4').textContent}:</h4>`;

                    parameters.filter(p => p.name !== 'target').forEach(param => {
                        const paramId = `${toolId}_${param.name}`;
                        if (param.type === 'checkbox') {
                            paramGroup.innerHTML += `
                                <div class="checkbox-group">
                                    <input type="checkbox" id="${paramId}">
                                    <label for="${paramId}">${param.label || param.name}</label>
                                </div>
                            `;
                        } else {
                            paramGroup.innerHTML += `
                                <div class="form-group">
                                    <label for="${paramId}">${param.label || param.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</label>
                                    <input type="${param.type}" id="${paramId}" placeholder="${param.placeholder || ''}" value="${param.default !== undefined ? param.default : ''}">
                                </div>
                            `;
                        }
                    });
                    toolParametersContainer.appendChild(paramGroup);
                }
            }
        }

        // Socket.IO event handler for real-time updates
        socket.on('scan_update', (data) => {
            console.log('Scan Update:', data);
            const resultsContainer = document.getElementById('resultsContainer');
            document.getElementById('resultsSection').style.display = 'block'; // Show results section

            // Clear previous results on initial update or if new scan
            if (!scanResults[data.tool]) {
                 scanResults[data.tool] = {}; // Initialize for this tool
            }

            const toolNameDisplay = data.tool.replace(/_/g, ' ').split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            let resultItem = document.getElementById(`result-${data.tool}`);
            if (!resultItem) {
                resultItem = document.createElement('div');
                resultItem.id = `result-${data.tool}`;
                resultsContainer.appendChild(resultItem);
            }

            let statusClass = 'result-item error';
            let statusIcon = '❓';
            let statusText = 'Processing...';

            if (data.result.error) {
                statusClass = 'result-item error';
                statusIcon = '❌';
                statusText = `Error: ${data.result.error}`;
            } else if (data.result.exit_code === 0) {
                statusClass = 'result-item success';
                statusIcon = '✅';
                statusText = 'Completed Successfully';
                const output_upper = data.result.stdout.toUpperCase();
                if (output_upper.includes('VULNERABLE') || output_upper.includes('CRITICAL') || output_upper.includes('EXPLOITED')) {
                    statusClass = 'result-item critical'; // Treat as critical if vulnerable
                    statusIcon = '🚨'; // Warning icon for vulnerabilities
                    statusText = 'Vulnerable / Exploited';
                } else if (output_upper.includes('WARNING') || output_upper.includes('WEAK') || output_upper.includes('INSECURE')) {
                    statusClass = 'result-item warning';
                    statusIcon = '⚠️';
                    statusText = 'Warning / Weak Configuration';
                }
            } else { // Non-zero exit code
                statusClass = 'result-item error';
                statusIcon = '❌';
                statusText = 'Failed';
                const output_upper = data.result.stdout.toUpperCase() + data.result.stderr.toUpperCase();
                if (output_upper.includes('VULNERABLE') || output_upper.includes('CRITICAL') || output_upper.includes('EXPLOITED')) {
                    statusClass = 'result-item critical'; 
                    statusIcon = '🚨';
                    statusText = 'Vulnerable / Exploited (Failed to complete)';
                } else if (output_upper.includes('WARNING') || output_upper.includes('WEAK') || output_upper.includes('INSECURE')) {
                    statusClass = 'result-item warning';
                    statusIcon = '⚠️';
                    statusText = 'Warning / Weak Configuration (Failed to complete)';
                } else if (output_upper.includes('ERROR') || output_upper.includes('FAILED')) {
                    statusText = 'Execution Failed';
                }
            }

            resultItem.className = statusClass;
            resultItem.innerHTML = `
                <h4>${statusIcon} ${toolNameDisplay}</h4>
                <p><strong>Target:</strong> ${data.target}</p>
                <p><strong>Status:</strong> ${statusText}</p>
                <p><strong>Log File:</strong> <a href="${data.result.log_file}" target="_blank">${data.result.log_file.split('/').pop()}</a></p>
                <h4>Standard Output:</h4>
                <pre>${data.result.stdout || 'No output.'}</pre>
                ${data.result.stderr ? `<h4>Standard Error:</h4><pre>${data.result.stderr}</pre>` : ''}
                ${data.result.error ? `<p class="error-output"><strong>Execution Error:</strong> ${data.result.error}</p>` : ''}
            `;
        });

        // Function to start the scan
        async function startScan() {
            const targetUrl = document.getElementById('targetUrl').value.trim();
            if (!targetUrl) {
                alert('Please enter a target URL or IP.');
                return;
            }
            if (selectedTools.size === 0) {
                alert('Please select at least one tool to run.');
                return;
            }

            const scanBtn = document.getElementById('scanBtn');
            scanBtn.disabled = true;
            scanBtn.innerHTML = 'Scanning... Please wait <div class="spinner" style="width: 20px; height: 20px; border-width: 3px; margin: 0 0 0 10px;"></div>'; // Inline spinner

            // Clear previous results
            document.getElementById('resultsContainer').innerHTML = '';
            document.getElementById('resultsSection').style.display = 'none';
            scanResults = {}; // Reset scan results for new scan

            // Collect dynamic options for each selected tool
            const optionsToSend = {};
            selectedTools.forEach(toolId => {
                const toolParamsDiv = document.querySelector(`[data-tool-param-for="${toolId}"]`);
                if (toolParamsDiv) {
                    const toolSpecificOptions = {};
                    toolParamsDiv.querySelectorAll('input, select').forEach(input => {
                        const paramName = input.id.replace(`${toolId}_`, '');
                        if (input.type === 'checkbox') {
                            toolSpecificOptions[paramName] = input.checked;
                        } else {
                            toolSpecificOptions[paramName] = input.value;
                        }
                    });
                    optionsToSend[toolId] = toolSpecificOptions;
                }
            });


            try {
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        target: targetUrl,
                        tools: Array.from(selectedTools),
                        options: optionsToSend // Send collected options
                    }),
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || `Server error: ${response.status}`);
                }

                // Display final results after all tools have run (if any)
                // The socket.io 'scan_update' handles real-time, this is for final confirmation/overall status
                // displayResults(result.results); // This might be redundant if socket.io is robust

                // Reload the reports section to show the newly generated report
                loadReports();

            } catch (error) {
                console.error('Scan initiation failed:', error);
                const resultsContainer = document.getElementById('resultsContainer');
                document.getElementById('resultsSection').style.display = 'block';
                resultsContainer.innerHTML = `
                    <div class="result-item error">
                        <h4>❌ Scan Failed</h4>
                        <pre>An error occurred during scan initiation: ${error.message}</pre>
                    </div>
                `;
            } finally {
                // Re-enable button and reset text
                scanBtn.disabled = false;
                scanBtn.innerHTML = '🚀 Launch Security Scan';
            }
        }

        // Function to load available reports
        async function loadReports() {
            const reportsContainer = document.getElementById('reportsContainer');
            reportsContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading reports...
                </div>
            `; // Show loading spinner
            try {
                const response = await fetch('/api/reports');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const reports = await response.json();
                reportsContainer.innerHTML = ''; // Clear loading indicator

                if (reports.length === 0) {
                    reportsContainer.innerHTML = '<p>No reports generated yet.</p>';
                    return;
                }

                reports.forEach(report => {
                    const reportItem = document.createElement('div');
                    reportItem.className = 'report-item';
                    reportItem.innerHTML = `
                        <h4>📋 Report for ${report.target}</h4>
                        <div class="report-summary">
                            <p><strong>Generated On:</strong> ${report.timestamp}</p>
                            <p><strong>Total Tests:</strong> ${report.summary.total_tests || 0}</p>
                            <p><strong>Vulnerabilities Found:</strong> <span style="color: ${report.summary.vulnerabilities_found > 0 ? '#dc3545' : '#28a745'}; font-weight: bold;">${report.summary.vulnerabilities_found || 0}</span></p>
                            <p><strong>Critical Issues:</strong> <span style="color: ${report.summary.critical_issues > 0 ? '#dc3545' : 'inherit'};">${report.summary.critical_issues || 0}</span></p>
                            <p><strong>Warnings:</strong> <span style="color: ${report.summary.warnings > 0 ? '#ffc107' : 'inherit'};">${report.summary.warnings || 0}</span></p>
                        </div>
                        <div class="report-actions">
                            <button class="btn btn-sm btn-secondary" onclick="viewReport('${report.id}')">
                                👁️ View HTML
                            </button>
                            <a href="/reports/${report.id}.html" target="_blank" class="btn btn-sm btn-primary">
                                💾 Download HTML
                            </a>
                            <a href="/reports/${report.id}.json" download="${report.id}.json" class="btn btn-sm btn-info">
                                💾 Download JSON
                            </a>
                        </div>
                    `;
                    reportsContainer.appendChild(reportItem);
                });
                
            } catch (error) {
                console.error('Failed to load reports:', error);
                document.getElementById('reportsContainer').innerHTML = '<p style="color: red;">Error loading reports. Please refresh the page.</p>';
            }
        }

        // Function to view a report (opens the HTML report in a new tab)
        function viewReport(reportId) {
            window.open(`/reports/${reportId}.html`, '_blank');
        }

        // Initial load of tools and reports when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            loadTools();
            loadReports();
        });
    </script>
</body>
</html>
